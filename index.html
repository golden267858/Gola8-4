<html lang="my">
<head>

    <style>
        :root { --tg-blue: #2AABEE; --viber-purple: #7360f2; --bg: #0f0f13; --gold: #fbc02d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        /* 彻底锁死屏幕，防止滑动 */
        body { background: var(--bg); color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- 1. 首屏引导层样式 --- */
        #entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000; 
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
        }
        #entry-screen img {
            width: 100%; height: 100%; max-width: 100%; 
            object-fit: contain; 
            animation: pulseBg 2s infinite ease-in-out; 
        }
        @keyframes pulseBg {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
        }

        /* 主内容容器（初始隐藏） */
        #main-content {
            display: none; 
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
        
        /* 顶部导航栏 */
        .chat-header {
            background: #1c1c24; padding: 12px 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 100;
        }
        
        /* 无边框呼吸 Logo 设计 */
        .avatar-wrapper {
            position: relative;
            width: 52px; height: 52px;
            display: flex; justify-content: center; align-items: center;
            animation: logo-breath 2.5s infinite ease-in-out;
            border-radius: 50%;
        }
        .avatar-wrapper img { 
            width: 100%; height: 100%; 
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(251, 192, 45, 0.5));
        }

        @keyframes logo-breath {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(251, 192, 45, 0.4)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(251, 192, 45, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(251, 192, 45, 0.4)); }
        }
        
        /* 在线状态绿点 */
        .online-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 14px; height: 14px;
            background: #4caf50;
            border: 2px solid #1c1c24;
            border-radius: 50%;
            z-index: 5;
        }

        .user-info h2 { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        .user-info p { font-size: 11px; color: #4caf50; font-weight: bold; text-transform: uppercase; }

        /* 聊天背景 */
        .chat-body { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; background-image: radial-gradient(circle at center 30%, #1a1a24 0%, #000 100%); }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; opacity: 0; animation: slideUp 0.4s forwards; }
        .bubble.left { background: #2c2c35; border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 2px 5px 10px rgba(0,0,0,0.3); color: #e0e0e0; }
        .bubble.right { background: linear-gradient(135deg, var(--gold), #f57f17); color: #000; font-weight: 800; border-bottom-right-radius: 4px; align-self: flex-end; box-shadow: -2px 5px 10px rgba(251, 192, 45, 0.2); }
        
        .typing-indicator { display: flex; gap: 4px; padding: 15px 20px; align-items: center; width: fit-content; }
        .dot { width: 8px; height: 8px; background: #666; border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: 0s; } .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-5px); opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 底部互动区 */
        .action-footer { background: #1c1c24; padding: 20px 20px 30px; display: none; flex-direction: column; gap: 15px; animation: slideUp 0.5s forwards; border-top: 1px solid rgba(255,255,255,0.05); }
        .action-title { text-align: center; font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; padding: 12px 5px; border-radius: 14px; color: white; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-tg { background: linear-gradient(135deg, var(--tg-blue), #1c82b6); }
        .btn-viber { background: linear-gradient(135deg, var(--viber-purple), #5d4ed1); }
        .btn img { width: 32px; height: 32px; margin-bottom: 4px; object-fit: contain; }
        .btn span { font-size: 14px; }

        .mini-trust { display: flex; justify-content: center; gap: 12px; margin-top: 5px; }
        .mini-trust img { height: 20px; border-radius: 4px; filter: grayscale(10%); opacity: 0.7; }

    </style>
</head>
<body>
